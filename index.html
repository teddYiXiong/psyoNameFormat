<html>

 <head>
  <title>PSYO Name Formatting V4.1</title>
   <h1>Please input the names</h1>
    <button class="parseFormatButton">Parsing: Normal Text</button>
    <button class="copyFormatButton">Copying: for Google</button>
   <br></br>
  <style>
   h1 {
    font-size: 40px;
   }
   button {
    font-size: 16px;
   }
   input {
    font-size: 16px;
   }
   .totalCount {
     font-size: 23px;
   }
   .indexList {
     width: 25px;
     float: left;
     white-space: pre;
   }
   .formattedList {
     margin-left: 25px;
     white-space: pre;
     -webkit-text-size-adjust: 100%;
     text-size-adjust: 100%;
   }
   .clear {
     clear: both;
   }
   .red {
     color: red;
   }
   .blue {
     color: blue;
   }
  </style>

 <body>
  <input></input>
  <button class="generateButton">Generate</button>
  <button class="sortButton">Sorting: Off</button>
  <button class="copyButton">Copy</button>

  <p class="totalCount">Total: Input the names then press Generate</p>
  <div>
    <div class="indexList">1.</div>
    <div class="formattedList">Placeholder "Hello World"</div>
   <div class="clear"></div>
  </div>

<script>

  /*(0.) Initiation-----------------------------*/
    const parseFormatButton = document.querySelector('.parseFormatButton');
    const copyFormatButton = document.querySelector('.copyFormatButton');
    const input = document.querySelector('input');
    const generateButton = document.querySelector('.generateButton');
    const sortButton = document.querySelector('.sortButton');
    const copyButton = document.querySelector('.copyButton');
    const totalCount = document.querySelector('.totalCount');
    const indexList = document.querySelector('.indexList');
    const formattedList = document.querySelector('.formattedList');
    let indexNumber = 0;

    const listFontSize = "20px";
    indexList.style.fontSize = listFontSize;
    formattedList.style.fontSize = listFontSize;
      
  /*(1.) Buttons Functions-------------------------*/
    generateButton.onclick = function() {
      parseInput();
      addSelectedArrayToList();
    };
      
    sortButton.onclick = function() {
      toggleFormat("Sort");
      setSortButtonText();
      addSelectedArrayToList();
    };
      
    copyButton.onclick = function() {
      copy(getStringToCopy());  };

    parseFormatButton.onclick = function() {
      toggleFormat("Parse");
      setParseButtonText();  };
      
    copyFormatButton.onclick = function() {
      toggleFormat("Copy");
      setCopyButtonText();  };
      
  /*(2.) Toggle Function---------------------------*/ 
    let parsingFormat = "Normal";
    let copyingFormat = "Google";
    let isSorting = false;
      
    function toggleFormat(toToggle) {
      if(toToggle == "Parse") {
        if(parsingFormat == "Normal") {
          parsingFormat = "Google";  }
        else if(parsingFormat == "Google") {
          parsingFormat = "Ragic";  }
        else if(parsingFormat == "Ragic") {
          parsingFormat = "Normal";  }
      }
      else if(toToggle == "Copy") {
        if(copyingFormat == "Normal") {
          copyingFormat = "Google";  }
        else if(copyingFormat == "Google") {
          copyingFormat = "Filemaker";  }
        else if(copyingFormat == "Filemaker") {
          copyingFormat = "Ragic";  }
        else if(copyingFormat == "Ragic") {
          copyingFormat = "Normal";  }
      }
      else if(toToggle == "Sort") {
        if(isSorting) {
          isSorting = false;  }
        else if(!isSorting) {
          isSorting = true;  }
      }
    }
      
  /*(3.) Parsing Functions-------------------------*/

    function setParseButtonText() {
      if(parsingFormat == "Normal") {
        parseFormatButton.textContent = "Parsing: Normal Text";
      }
      else if(parsingFormat == "Google") {
        parseFormatButton.textContent = "Parsing: Google";
      }
      else if(parsingFormat == "Ragic") {
        parseFormatButton.textContent = "Parsing: Ragic";
      }
    }
      
    function parseIntoArray(inputString) {
      if(parsingFormat == "Normal") {
      return inputString.split(' ');
      }
      else if(parsingFormat == "Google") {
      let arrayForGoogle = inputString.split(',');
        for(i=0;i<arrayForGoogle.length;i++) {
          arrayForGoogle[i] = arrayForGoogle[i].slice(1, arrayForGoogle[i].length-1);
        }
      return arrayForGoogle;
      }
      else if(parsingFormat == "Ragic") {
      let slicedString = inputString.slice(8,inputString.length-2);
      return slicedString.split('|');
      }
    }

    function parseInput() {
      let unformattedArray = parseIntoArray(input.value);
      emptyArrays();
      formattedArray = formatArray(unformattedArray);
      sortedArray = sortNames(formattedArray);
    }
      
  /*(4.) Copy Functions---------------------------*/
    function setCopyButtonText() {
      if(copyingFormat == "Normal") {
      copyFormatButton.textContent = "Copying: Normal Text";
      }
      else if(copyingFormat == "Google") {
      copyFormatButton.textContent = "Copying: Google";
      }
      else if(copyingFormat == "Filemaker") {
      copyFormatButton.textContent = "Copying: Filemaker";
      }
      else if(copyingFormat == "Ragic") {
      copyFormatButton.textContent = "Copying: Ragic";
      }
    }
      
    function getStringToCopy() {
      if(copyingFormat == "Normal") {
      return formattedNormally;
      }
      else if(copyingFormat == "Google") {
      return formattedForGoogle;
      }
      else if(copyingFormat == "Filemaker") {
      return formattedForFilemaker;
      }
      else if(copyingFormat == "Ragic") {
      return formattedForRagic;
      }
    }
      
    function copy(forCopy) {
      let temporaryInput = document.createElement("textarea");
        temporaryInput.value = forCopy;
        document.body.appendChild(temporaryInput);
        temporaryInput.select();
        document.execCommand("copy");
        document.body.removeChild(temporaryInput);
    }

  /*(5.) Sorting Functions---------------------*/
    function setSortButtonText() {
      if(isSorting) {
      sortButton.textContent = "Sorting: On";
      }
      else if(!isSorting) {
      sortButton.textContent = "Sorting: Off";
      }
    }
      
    function sortNames(inputArray) {
      let outputArray = [];
      let indexForArray = 0;
      
      for(i=0;i<nameOrder.length;i++) {
        if(inputArray.indexOf(nameOrder[i]) != -1) {
        outputArray[indexForArray] = nameOrder[i];;
        indexForArray++;  }
        }
      return outputArray;
    }
      
  /*(6.) Formatting Functions---------------------*/
    let formattedNormally = "";
    let formattedForGoogle = "";
    let formattedForFilemaker = "";
    let formattedForRagic = "";
    let formattedArray = [];
    let sortedArray = [];
      
    function resetStrings() {
      input.value = "";
      formattedNormally = "";
      formattedForGoogle = "";
      formattedForFilemaker = "";
      formattedForRagic = "regex:^(";
      indexList.textContent = "";
      formattedList.textContent = "";
      indexNumber = 0;
    }

    function endStrings() {
      formattedNormally = formattedNormally.slice(0, formattedNormally.length-1);
      formattedForGoogle = formattedForGoogle.slice(0, formattedForGoogle.length-1);
      formattedForFilemaker = formattedForFilemaker.slice(0, formattedForFilemaker.length-1);
      formattedForRagic = formattedForRagic.slice(0, formattedForRagic.length-1);
      formattedForRagic += ")$";
    }

    function emptyArrays() {
      formattedArray = [];
      sortedArray = [];
    }
      
    function formatArray(inputArray) {
      let formattedName;
      let outputArray = [];
      let indexForArray = 0;
        for(i=0; i<inputArray.length; i++)  {
        formattedName = formatName(inputArray[i]);
        if(formattedName != "") {
          outputArray[indexForArray] = formattedName;
          indexForArray++;  }
        }
      return outputArray;
    }
      
  /*(6.) Write-to-List Functions-------------------*/
    function addSelectedArrayToList() {
      resetStrings();
      resetRedundancyList();
      let inputArray = [];
      
      if(isSorting) {
        inputArray = sortedArray;  }
      else {
        inputArray = formattedArray;  }
      
      for(i=0; i<inputArray.length; i++)  {
      addNicknameToList(inputArray[i]);
      }
      endStrings();
      setTotal(indexNumber);
    }

    function addNicknameToList(inputName) { 
      console.log(parsingFormat!="Google"&&!isIncompatible(inputName));
      if(parsingFormat=="Google"&&isIncompatible(inputName)) {
      /*Do Nothing;*/  }
      else {
       if(!isRepeated(inputName)&&!isVague(inputName))  {
        indexNumber++;
        fillStrings(indexNumber, inputName, "normal");  }
       else if(isRepeated(inputName)&&!isVague(inputName)) {
        indexNumber++;
        fillStrings(indexNumber, inputName, "red");  }
       else if(isVague(inputName)) {
        indexNumber++;
        fillStrings(indexNumber, inputName, "blue");  }
      }
    }
      
    function fillStrings(index, nickname, color) {
      formattedNormally += `${nickname} `;
      formattedForGoogle += `[${nickname}],`;
      formattedForRagic += `${nickname}|`;
      formattedForFilemaker += `${nickname}\n`;
      indexList.innerHTML += `${index}.\r\n`;
      
      if(color == "normal") {
        formattedList.innerHTML += `${nickname}\r\n`;
      }
      else if(color == "red") {
        formattedList.innerHTML += `<span class='red'>${nickname}</span>\r\n`;
      }
      else if(color == "blue") {
        formattedList.innerHTML += `<span class='blue'>${nickname}</span>\r\n`;
      }
      else {
        console.log("Color not defined");
      }
    }
      
    function setTotal(number) {
      if(number != 0) {
      totalCount.textContent = `Total: ${number}`;
      }
      else if(number == 0) {
      totalCount.textContent = '';
      }
    }

  /*(7.) Check-name Functions---------------------*/
    let redundancyList = [];
    let redundancyIndex = 0;
      
    function resetRedundancyList() {
      redundancyList = [];
      redundancyIndex = 0;
    }
      
    function addToRedundancyList(item) {
      redundancyList[redundancyIndex] = item;
      redundancyIndex++;
    }
      
    function isRepeated(item) {
      if(redundancyList.indexOf(item) != -1) {
      addToRedundancyList(item);
      return true;
      }
      else {
      addToRedundancyList(item);
      return false;  }
    }
      
    function isVague(item) {
      let truthValue = false;
        for(k=0; k<vagueNames.length; k++)  {
        if(item == vagueNames[k]) {
          truthValue = true;  }
        }
      return truthValue;
    }
      
    function isIncompatible(item) {
      let truthValue = false;
        for(k=0; k<incompatibleNames.length; k++)  {
        if(item == incompatibleNames[k]) {
          truthValue = true;  }
        }
      return truthValue;
    }
